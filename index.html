<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하이파이브 - 스마트 촉각 QR 복약 안내</title>
    <!-- 파이어베이스 SDK 연동 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #0f172a;
            --text-light: #475569;
        }

        /* 약사 패널과 100% 동일한 은은한 스카이 블루 그라데이션 배경 및 정중앙 정렬 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 100px 20px 60px 20px;
            position: relative;
        }

        .team-container {
            width: 100%;
            max-width: 560px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            z-index: 10;
        }

        .team-credits {
            font-size: 12px;
            color: #475569;
            text-align: right;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.75);
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid rgba(191, 219, 254, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
        }
        .team-credits strong {
            color: #1e40af;
            font-weight: 700;
        }

        .instagram-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #db2777;
            background: rgba(219, 39, 119, 0.08);
            padding: 4px 10px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .instagram-link:hover {
            background: rgba(219, 39, 119, 0.15);
            transform: translateY(-1px);
        }

        .box {
            width: 100%;
            max-width: 560px;
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        
        .badge-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .badge-pharmacy {
            background: #fef3c7;
            color: #92400e;
            margin-left: 6px;
        }
        
        h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
            line-height: 1.4;
            color: #0f172a;
        }

        .instruction-box {
            width: 100%;
            min-height: 160px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 24px;
            word-break: break-all;
        }
        
        .btn-save {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, var(--primary) 100%);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-save:hover {
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .input-helper {
            font-size: 12px;
            color: #64748b;
            display: block;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }
        
        .footer-message {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px dashed #e2e8f0;
            text-align: center;
            font-style: italic;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        /* 반응형 처리 */
        @media (max-width: 900px) {
            body {
                padding-top: 30px;
            }
            .team-container {
                justify-content: center;
            }
            .team-credits {
                text-align: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="team-container">
        <div class="team-credits">
            2026 NSI 글로벌 리더십 챌린지 참가팀 <strong>'하이파이브'</strong><br>
            정병현(고려대) · 이서빈(경희대) · 최윤서(경인교대) · 황성철(중앙대) · 현수진(중앙대)
            <br>
            <a href="https://www.instagram.com/global_hifive?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="instagram-link">
                📸 공식 인스타그램 바로가기
            </a>
        </div>
    </div>

    <div class="box">
        <div class="badge-container">
            <div>
                <span class="badge">음성 가이드</span>
                <span class="badge badge-pharmacy" id="viewPharmacy">연결 중...</span>
            </div>
        </div>
        
        <h2 id="viewStickerTitle">-번 촉각 QR 복약 안내</h2>
        
        <!-- 복약 지도 텍스트가 표시될 영역 -->
        <div class="instruction-box" id="viewInstruction">
            의약품 복약 정보를 실시간으로 조회하고 있습니다...
        </div>
        
        <!-- 시각 약자를 위해 더 크게 제작된 TTS 버튼 -->
        <button class="btn-save" onclick="speakGuidance()">
            🔊 복약 안내 다시듣기
        </button>

        <span class="input-helper">※ 화면 어디든 가볍게 터치하시면 복약 음성이 다시 재생됩니다.</span>

        <div class="footer-message">
            "지역 사회를 위한 따뜻한 동행에 동참해주셔서 감사합니다."
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKcCMOT9OwFkkKm0Ot3StOFuDpimOCbNs",
            authDomain: "tactile-qr-code-sticker.firebaseapp.com",
            databaseURL: "https://tactile-qr-code-sticker-default-rtdb.firebaseio.com",
            projectId: "tactile-qr-code-sticker",
            storageBucket: "tactile-qr-code-sticker.appspot.com",
            messagingSenderId: "456709355304",
            appId: "1:456709355304:web:eb1ba4148b0398a8f6c21d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 약국 한글 명칭 맵
        const pharmacyNames = {
            "onnuri_minwoo": "온누리민우약국",
            "dolgoji": "돌곶이약국",
            "wellbeing": "성북웰빙약국",
            "beautiful": "아름다운약국"
        };

        // URL 파라미터 해독 (?p=약국코드&id=스티커번호)
        const urlParams = new URLSearchParams(window.location.search);
        const pParam = urlParams.get('p');
        const idParam = urlParams.get('id') || '001';

        // p 파라미터가 비어있다면 무조건 기본값인 'onnuri_minwoo'로 우회 (온누리민우약국 기존 스티커 100% 호환 보장)
        let pharmacyId = pParam ? pParam.trim() : 'onnuri_minwoo';

        // UI에 매핑된 약국명 및 타이틀 출력
        const korPharmacyName = pharmacyNames[pharmacyId] || pharmacyId;
        document.getElementById('viewPharmacy').innerText = "🏥 " + korPharmacyName;
        document.getElementById('viewStickerTitle').innerText = parseInt(idParam, 10) + "번 촉각 QR 복약 안내";

        // 온누리민우약국 기존 스티커와의 호환성 가치를 지키기 위해 조건부 경로 분기 적용
        let dbFetchPath = 'pharmacies/' + pharmacyId + '/stickers/' + idParam;
        if (pharmacyId === 'onnuri_minwoo') {
            dbFetchPath = 'stickers/' + idParam;
        }

        let currentInstructionText = ""; // 음성 데이터 수집을 위한 변수

        database.ref(dbFetchPath).on('value', (snapshot) => {
            const data = snapshot.val();
            const targetBox = document.getElementById("viewInstruction");
            
            if (data && data.instruction) {
                currentInstructionText = data.instruction;
                targetBox.innerText = currentInstructionText;
                
                // 정보 획득 시 음성 자동 실행
                speakGuidance();
            } else {
                currentInstructionText = "등록된 복약 지도 정보가 없습니다. 해당 약국으로 문의해주세요.";
                targetBox.innerHTML = "<span style='color:#94a3b8;'>등록된 복약 지도 정보가 없습니다.</span>";
                speakGuidance();
            }
        });

        // TTS 안내 음성 송출 제어 함수
        function speakGuidance() {
            window.speechSynthesis.cancel(); // 이전 작동음 초기화

            if (!currentInstructionText) return;

            // 시인성 높은 인트로 문장 추가 구성
            const fullSpeechText = korPharmacyName + "에서 안내드립니다. " + currentInstructionText;
            
            const utterance = new SpeechSynthesisUtterance(fullSpeechText);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.95; // 노인 및 시각장애인 분들을 위해 5% 가청 감속 조정
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }

        // 터치 및 마우스 클릭만 해도 음성이 즉각 리플레이되는 반응형 UX
        document.body.addEventListener('click', function() {
            speakGuidance();
        });
    </script>
</body>
</html>
