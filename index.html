<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하이파이브 - 스마트 촉각 QR 복약 안내</title>
    <!-- 파이어베이스 SDK 연동 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        /* 기본 레이아웃 초기화: 스크롤을 완전히 없애고 모바일 전체 화면(100vh)에 고정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        /* 스마트폰 화면을 상단(정보 노출: 60%)과 하단(터치 컨트롤: 40%) 영역으로 분할 */
        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* 1. 상단 정보 노출 영역 (딥 블랙 테마로 명도대비 극대화) */
        .top-section {
            flex: 6.2;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
            position: relative;
        }

        /* 성북구 약사회 시범운영 캡슐 배지 */
        .badge {
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .section-label {
            color: #94a3b8;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        /* 저시력자를 위한 초고대비/슈퍼 사이즈 폰트 */
        .instruction-text {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.5;
            color: #ff6b6b; /* 높은 채도의 코랄 레드 색상으로 강력한 명시성 제공 */
            max-width: 90%;
            word-break: keep-all;
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* 2. 하단 대형 스피커/터치 제어 영역 (선명한 로열 블루 테마) */
        .bottom-section {
            flex: 3.8;
            background-color: #2563eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3);
        }

        .bottom-section:active {
            background-color: #1d4ed8; /* 터치 시 확실한 시각 피드백 */
        }

        /* 거대한 3D 입체 스피커 애니메이션 아이콘 */
        .speaker-icon {
            font-size: 76px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
            animation: pulse 2s infinite;
        }

        .touch-guide-text {
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        
        <!-- 상단: 고대비 정보 노출 영역 (60%) -->
        <div class="top-section">
            <div class="badge">✓ 성북구 약사회 시범운영</div>
            <div class="section-label" id="viewPharmacy">연결 중...</div>
            <div class="instruction-text" id="viewInstruction">
                복약 정보를 가져오고 있습니다...
            </div>
        </div>

        <!-- 하단: 거대 터치 패널 (40%) -->
        <div class="bottom-section">
            <div class="speaker-icon">🔊</div>
            <div class="touch-guide-text">화면 아래를 눌러 다시 듣기</div>
        </div>

    </div>

    <script>
        // 파이어베이스 데이터베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCKcCMOT9OwFkkKm0Ot3StOFuDpimOCbNs",
            authDomain: "tactile-qr-code-sticker.firebaseapp.com",
            databaseURL: "https://tactile-qr-code-sticker-default-rtdb.firebaseio.com",
            projectId: "tactile-qr-code-sticker",
            storageBucket: "tactile-qr-code-sticker.appspot.com",
            messagingSenderId: "456709355304",
            appId: "1:456709355304:web:eb1ba4148b0398a8f6c21d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 등록된 지역 약국 목록 매핑
        const pharmacyNames = {
            "onnuri_minwoo": "온누리민우약국",
            "dolgoji": "돌곶이약국",
            "wellbeing": "성북웰빙약국",
            "beautiful": "아름다운약국"
        };

        // 주소창 파라미터 파싱 (?p=약국코드&id=스티커번호)
        const urlParams = new URLSearchParams(window.location.search);
        const pParam = urlParams.get('p');
        const idParam = urlParams.get('id') || '001';

        // 약국 ID 미지정 시 온누리민우약국으로 자동 대체하여 호환성 사수
        let pharmacyId = pParam ? pParam.trim() : 'onnuri_minwoo';

        const displayPharmacyName = pharmacyNames[pharmacyId] || pharmacyId;
        document.getElementById('viewPharmacy').innerText = "🏥 " + displayPharmacyName + " 복약 지도 내용";

        // 기존 배포된 실물 스티커의 쿼리를 고려해 저장소 경로 자동 분기
        let dbFetchPath = 'pharmacies/' + pharmacyId + '/stickers/' + idParam;
        if (pharmacyId === 'onnuri_minwoo') {
            dbFetchPath = 'stickers/' + idParam;
        }

        let currentInstructionText = ""; // TTS 음성 합성용 전역 변수
        let hasPlayedIntro = false;      // 최초 진입 1회용 안내 추적 제어 변수

        // 파이어베이스 실시간 데이터 수신 이벤트 리스너
        database.ref(dbFetchPath).on('value', (snapshot) => {
            const data = snapshot.val();
            const targetBox = document.getElementById("viewInstruction");
            
            if (data && data.instruction) {
                currentInstructionText = data.instruction;
                targetBox.innerText = currentInstructionText;
                targetBox.style.color = "#ff6b6b"; // 입력 정보 존재 시 강조용 코랄 레드 적용
                
                // 앱 실행 후 데이터를 처음 조회했을 때만 전체 안내(true) 실행
                if (!hasPlayedIntro) {
                    speakGuidance(true);
                    hasPlayedIntro = true;
                } else {
                    speakGuidance(false);
                }
            } else {
                currentInstructionText = "아직 약사님이 정보를 입력하지 않았습니다.";
                targetBox.innerText = currentInstructionText;
                targetBox.style.color = "#ff8b8b"; // 알림용 주황빛 감도는 텍스트 색상
                
                if (!hasPlayedIntro) {
                    speakGuidance(true);
                    hasPlayedIntro = true;
                } else {
                    speakGuidance(false);
                }
            }
        });

        // 🔊 [개선] 최초 실행(isFirst = true)과 재안내(isFirst = false)를 구분하는 흐름 기반 TTS 제어기
        function speakGuidance(isFirst = false) {
            // 브라우저 합성 채널 초기화 (음성 중첩 혼선 방지)
            window.speechSynthesis.cancel();

            if (!currentInstructionText) return;

            let unifiedSpeechText = "";

            if (isFirst) {
                // 🌟 최초 1회 접속 시에만 규정대로 전체 흐름(1~4단계) 친절하게 재생
                unifiedSpeechText = 
                    "큐알 코드 인식에 성공하였습니다. " +
                    "화면 어디를 눌러도 음성이 다시 재생됩니다. " +
                    displayPharmacyName + "에서 전해드리는 복약 지도는 다음과 같습니다. " + 
                    currentInstructionText;
            } else {
                // 🌟 사용자가 화면을 터치해 재안내를 요청했을 때는 서론 없이 "복약지도 내용"만 빠르게 낭독
                unifiedSpeechText = currentInstructionText;
            }

            const utterance = new SpeechSynthesisUtterance(unifiedSpeechText);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.95; // 장년층 및 전맹 시각약자가 안전하게 수용하도록 속도를 5% 감속 조율
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }

        // 터치 디바이스에서 touchstart와 click이 동시에 감지되어 재생음이 두 번 부딪히는 현상 방지 필터
        let lastTouchTime = 0;
        function handleInteraction(e) {
            const now = Date.now();
            if (now - lastTouchTime < 400) return; // 0.4초 이내의 다중 호출을 차단해 버그 차단
            
            if (e.type === 'touchstart') {
                lastTouchTime = now;
            }
            speakGuidance(false); // 재안내를 수동으로 요청한 것이므로 '본문'만 신속하게 재생
        }

        // 화면 상/하단 어디를 눌러도 본문 복약 지도를 즉각 재수신할 수 있도록 바인딩
        document.body.addEventListener('click', handleInteraction);
        document.body.addEventListener('touchstart', handleInteraction);
    </script>
</body>
</html>
