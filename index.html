<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하이파이브 - 스마트 촉각 QR 복약 안내</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #121212; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        .viewport-wrapper { display: flex; flex-direction: column; width: 100%; height: 100vh; }
        .top-section { flex: 6.2; background-color: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; position: relative; }
        .badge { background-color: rgba(16, 185, 129, 0.15); color: #10b981; padding: 8px 18px; border-radius: 50px; font-size: 15px; font-weight: 700; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(16, 185, 129, 0.3); }
        .section-label { color: #94a3b8; font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: 0.05em; }
        .instruction-text { font-size: 32px; font-weight: 800; line-height: 1.5; color: #ff6b6b; max-width: 90%; word-break: keep-all; text-align: center; letter-spacing: -0.02em; }
        .bottom-section { flex: 3.8; background-color: #2563eb; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; cursor: pointer; transition: background-color 0.2s ease; position: relative; box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3); }
        .bottom-section:active { background-color: #1d4ed8; }
        .speaker-icon { font-size: 76px; margin-bottom: 12px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2)); animation: pulse 2s infinite; }
        .touch-guide-text { color: #ffffff; font-size: 24px; font-weight: 800; letter-spacing: -0.03em; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="top-section">
            <div class="badge">✓ 성북구 약사회 시범운영</div>
            <div class="section-label" id="viewPharmacy">연결 중...</div>
            <div class="instruction-text" id="viewInstruction">복약 정보를 가져오고 있습니다...</div>
        </div>
        <div class="bottom-section" onclick="handleTouchPlay()">
            <div class="speaker-icon">🔊</div>
            <div class="touch-guide-text">화면 아래를 눌러 다시 듣기</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKcCMOT9OwFkkKm0Ot3StOFuDpimOCbNs",
            authDomain: "tactile-qr-code-sticker.firebaseapp.com",
            databaseURL: "https://tactile-qr-code-sticker-default-rtdb.firebaseio.com",
            projectId: "tactile-qr-code-sticker",
            storageBucket: "tactile-qr-code-sticker.appspot.com",
            messagingSenderId: "456709355304",
            appId: "1:456709355304:web:eb1ba4148b0398a8f6c21d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let pharmacyId = urlParams.get('p') || '온누리민우약국';
        const idParam = urlParams.get('id') || '001';

        const cleanId = pharmacyId.replace(/\s+/g, '').toLowerCase();
        if (cleanId === 'onnuri_minwoo' || cleanId === '온누리민우약국') { pharmacyId = '온누리민우약국'; }

        document.getElementById('viewPharmacy').innerText = "🏥 " + pharmacyId + " 복약 지도 내용";

        let dbFetchPath = 'pharmacies/' + pharmacyId + '/stickers/' + idParam;

        let currentInstructionText = ""; 
        let firebaseReady = false;   // 파이어베이스 데이터 수신 완료 여부
        let introFinished = false;   // 인트로 안내 방송 종료 여부
        let hasStartedPlaying = false; // 첫 로드 음성 시동 여부

        // 🌟 [엔진 웜업] 웹 오디오 브라우저 큐 미리 활성화
        if (window.speechSynthesis) { window.speechSynthesis.getVoices(); }

        // 🌟 [개선 핵심] 파이어베이스 네트워크를 기다리지 않고 진입 즉시 인트로 방송 송출!
        function startStreamingGuidance() {
            if (hasStartedPlaying) return;
            hasStartedPlaying = true;

            window.speechSynthesis.cancel(); // 큐 클리어

            // 1. 고정 안내 방송 즉시 재생 (네트워크 대기 시간 제거용)
            const introText = `큐알 코드 인식에 성공하였습니다. 화면 어디를 눌러도 음성이 다시 재생됩니다. ${pharmacyId}에서 전해드리는 복약 지도 내용입니다.`;
            const utteranceIntro = new SpeechSynthesisUtterance(introText);
            utteranceIntro.lang = 'ko-KR';
            utteranceIntro.rate = 1.0;

            // 인트로 방송이 끝났을 때의 콜백 제어
            utteranceIntro.onend = function() {
                introFinished = true;
                playContentBody(); // 본문 낭독으로 바톤 터치
            };

            window.speechSynthesis.speak(utteranceIntro);
        }

        // 2. 파이어베이스 본문 복약 지도 내용 재생
        function playContentBody() {
            if (!introFinished || !firebaseReady) return; // 두 조건이 모두 만족할 때만 재생

            const utteranceBody = new SpeechSynthesisUtterance(currentInstructionText);
            utteranceBody.lang = 'ko-KR';
            utteranceBody.rate = 0.95; // 본문은 명확하게 0.95 속도 유지
            window.speechSynthesis.speak(utteranceBody);
        }

        // 파이어베이스 실시간 수신 리스너
        database.ref(dbFetchPath).on('value', (snapshot) => {
            const data = snapshot.val();
            const targetBox = document.getElementById("viewInstruction");
            
            if (data && data.instruction) {
                currentInstructionText = data.instruction;
                targetBox.innerText = currentInstructionText;
                targetBox.style.color = "#ff6b6b"; 
            } else {
                currentInstructionText = "아직 약사님이 정보를 입력하지 않았습니다.";
                targetBox.innerText = currentInstructionText;
                targetBox.style.color = "#ff8b8b";
            }
            
            firebaseReady = true;
            
            // 만약 인트로 방송이 이미 끝난 상태에서 뒤늦게 DB가 로드되었다면 즉시 본문 실행
            if (introFinished) {
                playContentBody();
            }
        });

        // 🌟 [모바일 최적화 안전장치] 
        // 크롬/사파리 등 스마트폰 브라우저는 '첫 터치'가 일어나기 전까지 음성을 강제로 막는 보안 정책(Autoplay Policy)이 있습니다.
        // 이를 깨부수기 위해, 진입하자마자 자동 재생을 시도하되 만약 막히더라도 환자가 화면을 터치하는 순간 '대기시간 0초'로 즉시 터져 나오게 이중 설계했습니다.
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { startStreamingGuidance(); }, 100);
        });

        function handleTouchPlay() {
            // 최초 진입 시 음성이 막혀있던 상황이라면 인트로 스트리밍 시동
            if (!hasStartedPlaying) {
                startStreamingGuidance();
                return;
            }
            
            // 이미 첫 안내가 완전히 끝난 상태에서 다시 화면을 누르면 '복약 본문 내용만' 딜레이 없이 즉시 깔끔하게 반복 재생!
            if (introFinished && firebaseReady) {
                window.speechSynthesis.cancel();
                const utteranceBody = new SpeechSynthesisUtterance(currentInstructionText);
                utteranceBody.lang = 'ko-KR';
                utteranceBody.rate = 0.95;
                window.speechSynthesis.speak(utteranceBody);
            }
        }

        document.body.addEventListener('click', handleTouchPlay);
        document.body.addEventListener('touchstart', handleTouchPlay);
    </script>
</body>
</html>
