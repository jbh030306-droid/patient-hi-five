<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안전 복약 가이드</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            cursor: pointer; 
        }
        .info-section { 
            flex: 50; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .badge { 
            background: #27272a; 
            color: #4ade80; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 20px;
        }
        .status-text { 
            font-size: 24px;
            color: #a1a1aa;
            margin-bottom: 10px;
        }
        .med-name {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            margin: 15px 0;
            word-break: keep-all;
        }
        .med-info {
            font-size: 28px;
            color: #e4e4e7;
            line-height: 1.6;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: keep-all;
        }
        .button-section {
            flex: 35;
            background-color: #1e1e24;
            border-top: 2px solid #27272a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .action-hint {
            font-size: 34px;
            font-weight: bold;
            color: #4ade80;
            text-align: center;
            word-break: keep-all;
        }
        .sub-hint {
            font-size: 20px;
            color: #71717a;
            margin-top: 12px;
        }
        /* 🚨 팀장님 확인용 실시간 시스템 진단 패널 (화면 하단 15% 차지) */
        .debug-panel {
            flex: 15;
            background-color: #000000;
            border-top: 2px dashed #dc2626;
            color: #ef4444;
            font-family: monospace;
            font-size: 13px;
            padding: 10px;
            overflow-y: auto;
            box-sizing: border-box;
            text-align: left;
            pointer-events: none; /* 클릭 방해 금지 */
        }
    </style>
</head>
<body>

    <div class="info-section">
        <div class="badge" id="sticker-badge">약 번호 확인 중</div>
        <div class="status-text" id="status-label">안내를 시작하려면 화면을 터치하세요</div>
        <div class="med-name" id="med-title">복약 가이드</div>
        <div class="med-info" id="med-details">화면 아무 곳이나 가볍게 누르시면 음성 복약 안내가 시작됩니다.</div>
    </div>

    <div class="button-section">
        <div class="action-hint">🔊 화면 어디든 누르면 다시 재생</div>
        <div class="sub-hint">손끝 닿는 곳 전체가 터치 버튼입니다</div>
    </div>

    <div class="debug-panel" id="debug-log">
        [시스템 진단 로그]<br>
        - URL 감지 시작...
    </div>

    <script>
        const logArea = document.getElementById('debug-log');
        function log(msg, isSuccess = false) {
            const color = isSuccess ? '#4ade80' : '#ef4444';
            logArea.innerHTML += `<br><span style="color:${color}">${msg}</span>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCKcCMOT9OwFkkKm0Ot3StOFuDpim0CbNs",
            authDomain: "tactile-qr-code-sticker.firebaseapp.com",
            databaseURL: "https://tactile-qr-code-sticker-default-rtdb.firebaseio.com",
            projectId: "tactile-qr-code-sticker",
            storageBucket: "tactile-qr-code-sticker.firebasestorage.app",
            messagingSenderId: "456709355304",
            appId: "1:456709355304:web:eb1ba4148b0398a8f6c21d"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            log("- 파이어베이스 연동 성공(Config OK)", true);
        } catch(e) {
            log("- 파이어베이스 연동 실패: " + e.message);
        }

        const database = firebase.database();
        let guideText = "복약 정보를 불러오는 중입니다.";
        let isFirstClick = true;

        const urlParams = new URLSearchParams(window.location.search);
        let stickerId = urlParams.get('id');
        
        if(!stickerId) {
            log("- [경고] 주소 뒤에 ?id=001이 없습니다! 기본값 001로 시도합니다.");
            stickerId = "001";
        }
        
        document.getElementById('sticker-badge').innerText = `약 번호: ${stickerId}`;
        log(`- 주소창 인식 완료 (찾는 ID: ${stickerId})`, true);

        function loadData(id) {
            log(`- DB 경로 감시 중: medicines/${id}...`);
            
            database.ref('medicines/' + id).on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    log(`- [성공] 데이터 수신 완료! 데이터 형태: ${typeof data}`, true);
                    log(`- [수신 내용]: ${JSON.stringify(data)}`, true);

                    document.getElementById('sticker-badge').innerText = `약 번호: ${id}`;
                    let name = "복약 안내";
                    let info = "";
                    let appearance = "";
                    let expiration = "";

                    if (typeof data === 'object') {
                        // 💡 만약 데이터가 객체인데 name이나 info가 없다면 대안 필드 검색
                        name = data.name || data.title || "안전 복약 안내";
                        info = data.info || data.content || data.text || "내용이 비어있습니다.";
                        appearance = data.appearance ? `이 약은 ${data.appearance} 모양입니다. ` : ""; 
                        expiration = data.expiration ? `유통기한은 ${data.expiration}까지입니다. ` : "";
                        
                        document.getElementById('med-details').innerText = `${info}\n\n[약 특징]: ${data.appearance || '미등록'}\n[유통기한]: ${data.expiration || '미등록'}`;
                    } else {
                        info = data.toString();
                        document.getElementById('med-details').innerText = info;
                    }

                    guideText = `${name}입니다. ${appearance}${info} ${expiration}`;
                    document.getElementById('med-title').innerText = name;
                    document.getElementById('status-label').innerText = "복약 안내 준비 완료";
                } else {
                    log(`- [실패] medicines/${id} 경로에 데이터가 비어있음 (null)`);
                    if (!id.endsWith('번')) {
                        log(`- [우회] 뒤에 '번'을 붙여 medicines/${id}번 경로로 다시 찾습니다.`);
                        loadData(id + '번');
                    } else {
                        guideText = "등록되지 않은 약 스티커 번호입니다.";
                        document.getElementById('med-title').innerText = "약 정보 없음";
                        document.getElementById('med-details').innerText = guideText;
                    }
                }
            }, (error) => {
                log("- 파이어베이스 데이터베이스 에러 발생: " + error.message);
            });
        }

        loadData(stickerId);

        function playTTS(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.75; 
            window.speechSynthesis.speak(utterance);
        }

        document.body.addEventListener('click', function() {
            if (navigator.vibrate) { navigator.vibrate(200); }
            if (isFirstClick) {
                const welcomeText = "큐알 코드가 인식되었습니다. " + guideText;
                playTTS(welcomeText);
                isFirstClick = false;
                document.getElementById('status-label').innerText = "🔊 현재 복약 정보 재생 중";
            } else {
                playTTS(guideText);
            }
        });
    </script>
</body>
</html>
