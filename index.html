<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안전 복약 가이드</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            cursor: pointer; 
        }
        .info-section { 
            flex: 55; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .badge { 
            background: #27272a; 
            color: #4ade80; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 20px;
        }
        .status-text { 
            font-size: 24px;
            color: #a1a1aa;
            margin-bottom: 10px;
        }
        .med-name {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            margin: 15px 0;
            word-break: keep-all;
        }
        .med-info {
            font-size: 28px;
            color: #e4e4e7;
            line-height: 1.6;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: keep-all;
        }
        .button-section {
            flex: 45;
            background-color: #1e1e24;
            border-top: 2px solid #27272a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .action-hint {
            font-size: 34px;
            font-weight: bold;
            color: #4ade80;
            text-align: center;
            word-break: keep-all;
        }
        .sub-hint {
            font-size: 20px;
            color: #71717a;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="info-section">
        <div class="badge" id="sticker-badge">약 번호 확인 중</div>
        <div class="status-text" id="status-label">안내를 시작하려면 화면을 터치하세요</div>
        <div class="med-name" id="med-title">복약 가이드</div>
        <div class="med-info" id="med-details">화면 아무 곳이나 가볍게 누르시면 음성 복약 안내가 시작됩니다.</div>
    </div>

    <div class="button-section">
        <div class="action-hint">🔊 화면 어디든 누르면 다시 재생</div>
        <div class="sub-hint">손끝 닿는 곳 전체가 터치 버튼입니다</div>
    </div>

    <script>
        // 유령 문자가 전부 청소된 정식 파이어베이스 설정 값
        const firebaseConfig = {
            apiKey: "AIzaSyCKcCMOT9OwFkkKm0Ot3StOFuDpim0CbNs",
            authDomain: "tactile-qr-code-sticker.firebaseapp.com",
            databaseURL: "https://tactile-qr-code-sticker-default-rtdb.firebaseio.com",
            projectId: "tactile-qr-code-sticker",
            storageBucket: "tactile-qr-code-sticker.firebasestorage.app",
            messagingSenderId: "456709355304",
            appId: "1:456709355304:web:eb1ba4148b0398a8f6c21d"
        };

        // 엔진 초기화
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let guideText = "복약 정보를 불러오는 중입니다.";
        let isFirstClick = true;

        const urlParams = new URLSearchParams(window.location.search);
        let stickerId = urlParams.get('id') || "001"; 
        
        // 스크립트가 정상 작동하면 배지 내용부터 즉시 변경되도록 처리
        document.getElementById('sticker-badge').innerText = `약 번호: ${stickerId}`;

        function loadData(id) {
            database.ref('medicines/' + id).on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    document.getElementById('sticker-badge').innerText = `약 번호: ${id}`;
                    let name = "복약 안내";
                    let info = "";
                    let appearance = "";
                    let expiration = "";

                    if (typeof data === 'object') {
                        name = data.name || "안전 복약 안내";
                        info = data.info || "등록된 내용이 없습니다.";
                        appearance = data.appearance ? `이 약은 ${data.appearance} 모양입니다. ` : ""; 
                        expiration = data.expiration ? `유통기한은 ${data.expiration}까지입니다. ` : "";
                        
                        document.getElementById('med-details').innerText = `${info}\n\n[약 특징]: ${data.appearance || '미등록'}\n[유통기한]: ${data.expiration || '미등록'}`;
                    } else if (typeof data === 'string') {
                        info = data;
                        document.getElementById('med-details').innerText = info;
                    }

                    guideText = `${name}입니다. ${appearance}${info} ${expiration}`;
                    document.getElementById('med-title').innerText = name;
                    document.getElementById('status-label').innerText = "복약 안내 준비 완료";
                } else {
                    if (!id.endsWith('번')) {
                        loadData(id + '번');
                    } else {
                        guideText = "등록되지 않은 약 스티커 번호입니다.";
                        document.getElementById('med-title').innerText = "약 정보 없음";
                        document.getElementById('med-details').innerText = guideText;
                    }
                }
            });
        }

        // 실시간 데이터 감시 시작
        loadData(stickerId);

        function playTTS(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.75; 
            window.speechSynthesis.speak(utterance);
        }

        document.body.addEventListener('click', function() {
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }

            if (isFirstClick) {
                const welcomeText = "큐알 코드가 인식되었습니다. " + guideText;
                playTTS(welcomeText);
                isFirstClick = false;
                document.getElementById('status-label').innerText = "🔊 현재 복약 정보 재생 중";
            } else {
                playTTS(guideText);
            }
        });
    </script>
</body>
</html>
